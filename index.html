<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jungle — Romeo feat. Bas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f4f0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .card {
      background: #ffffff;
      border: 0.5px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-width: 320px;
      max-width: 480px;
      width: 90%;
    }

    .track-label {
      font-size: 13px;
      color: #6b6a66;
    }

    audio {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="track-label">Jungle — Romeo feat. Bas</p>
    <audio controls autoplay muted>
      <source src="Jungle - Romeo feat. Bas .mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
  </div>
</body>
</html>
